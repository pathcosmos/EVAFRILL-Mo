# EVAFRILL-Mo 3B SFT Configuration
#
# Base model: checkpoints/3b_final/checkpoint-0319772
#   - Hybrid Mamba-2 + Transformer (26L: 24×Mamba + 2×Attn), 2.94B params
#   - Pretrain 완료: 319,772 steps, 62h, 3/9 완료
#   - 아키텍처는 sft.py가 checkpoint/config.yaml에서 자동 로드 — model: 섹션 무시됨
#
# Data: data/sft_combined/train_filtered.jsonl (2.44M samples, filtered)
#       data/sft_combined/val_filtered.jsonl   (49.8K samples)
#
# 실행: bash train_3b_sft_resilient.sh
#
# [설계 근거 — 2026-03-10]
#   - GPU: 7× B200
#   - eff_batch: 2 × 7GPU × 4 grad_accum = 56
#   - 1 epoch: 2,439,397 / 56 ≈ 43,560 steps → max_steps=44000 (≈1 epoch)
#   - lr=1e-5: pretrain lr(3e-4)의 1/30 (catastrophic forgetting 방지)
#   - NEFTune alpha=5.0: 반복 퇴화 완화, 생성 다양성 향상
#   - save_interval=5000, eval_interval=1000

train:
  max_steps: 44000       # ≈ 1 epoch on 2.44M samples, eff_batch=56
  batch_size: 2          # per GPU (Mamba-2 hybrid VRAM 절약)
  grad_accum_steps: 4    # eff_batch: 2 × 7GPU × 4 = 56
  lr: 1.0e-5             # pretrain 3e-4의 1/30 (catastrophic forgetting 방지)
  weight_decay: 0.01
  warmup_steps: 500      # 1.1% of 44,000 steps
  max_grad_norm: 1.0
  log_interval: 10
  save_interval: 5000
  eval_interval: 1000
  neftune_alpha: 5.0     # NEFTune noise injection (반복 퇴화 완화)

tokenizer:
  vocab_size: 64000
  type: sentencepiece_unigram
